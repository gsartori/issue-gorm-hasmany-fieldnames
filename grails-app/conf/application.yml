dataSource:
  pooled: true
  jmxExport: true
  driverClassName: com.mysql.cj.jdbc.Driver
  url: jdbc:mysql://localhost:3306/issue?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
  username: root
  password: root

  properties:
    # Pool
    maximumPoolSize: 20
    minimumIdle: 5
    connectionTimeout: 10000
    idleTimeout: 300000          # 5 min
    maxLifetime: 1800000         # 30 min

    # Validation
    validationTimeout: 3000

    # Debug (optional)
    leakDetectionThreshold: 10000

    # JMX
    registerMbeans: true

environments:
  development:
    dataSource:
      dbCreate: update

  test:
    dataSource:
      dbCreate: update

  production:
    dataSource:
      dbCreate: update


hibernate:
  cache:
    queries: false
    use_second_level_cache: false
    use_query_cache: false

  naming_strategy: issue.TNamingStrategy


grails:
  codegen:
    defaultPackage: issue
  profile: web
  mime:
    types:
      all: '*/*'
      atom: application/atom+xml
      css: text/css
      csv: text/csv
      form: application/x-www-form-urlencoded
      html:
      - text/html
      - application/xhtml+xml
      js: text/javascript
      json:
      - application/json
      - text/json
      multipartForm: multipart/form-data
      pdf: application/pdf
      rss: application/rss+xml
      text: text/plain
      hal:
      - application/hal+json
      - application/hal+xml
      xml:
      - text/xml
      - application/xml
  views:
    gsp:
      encoding: UTF-8
      htmlcodec: xml
      codecs:
        scriptlet: html
